name: Deploy – GitHub Pages (Demo)
# ─────────────────────────────────────────────────────────────────────────────
# Deploys the static frontend to GitHub Pages on every push to main.
# No backend is needed. Forms show demo messaging with your contact details.
# Live at: https://<your-username>.github.io/<repo-name>/
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      # Only re-deploy Pages when the frontend actually changes
      - "index.html"
      - "404.html"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify index.html exists
        run: |
          [ -f index.html ] || { echo "❌ index.html not found in repo root"; exit 1; }
          echo "✅ index.html found ($(wc -c < index.html) bytes)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploys only these files — backend/, nginx/, scripts/ etc. are ignored
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print live URL
        run: echo "✅ GitHub Pages live at ${{ steps.deployment.outputs.page_url }}"
